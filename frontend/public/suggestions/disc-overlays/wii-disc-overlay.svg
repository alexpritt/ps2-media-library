<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" width="256" height="256">
  <defs>
    <clipPath id="discclip">
      <circle cx="128" cy="128" r="120"/>
    </clipPath>
  </defs>
  <!-- Transparent overlay clipped to disc shape -->
  <g clip-path="url(#discclip)">
    <!-- Wii logo positioned center-left of disc (like real Wii discs) -->
    <!-- The logo sits left of center, avoiding the center hole area -->
    <text
      x="72"
      y="148"
      font-family="Arial Black, Arial, sans-serif"
      font-size="54"
      font-weight="900"
      font-style="italic"
      fill="white"
      opacity="0.92"
      text-anchor="middle"
      letter-spacing="-1"
    >Wii</text>
    <!-- Subtle TM mark -->
    <text
      x="105"
      y="135"
      font-family="Arial, sans-serif"
      font-size="11"
      font-weight="bold"
      fill="white"
      opacity="0.75"
    >TM</text>
  </g>
</svg>
