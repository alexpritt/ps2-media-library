<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" width="256" height="256">
  <defs>
    <linearGradient id="xboxdiscgrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(0,150,0,0.1);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgba(0,100,0,0.25);stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Xbox disc overlay -->
  <circle cx="128" cy="128" r="120" fill="url(#xboxdiscgrad)"/>
  <circle cx="128" cy="128" r="116" stroke="rgba(100,200,100,0.25)" stroke-width="2" fill="none"/>
  <!-- Center hole -->
  <circle cx="128" cy="128" r="30" fill="rgba(0,0,0,0.2)"/>
  <circle cx="128" cy="128" r="26" stroke="rgba(100,150,100,0.3)" stroke-width="1" fill="none"/>
  <!-- Glossy -->
  <ellipse cx="88" cy="88" rx="62" ry="52" fill="rgba(255,255,255,0.1)"/>
  <!-- Xbox orb indicator -->
  <circle cx="128" cy="128" r="70" stroke="rgba(100,200,100,0.15)" stroke-width="2" fill="none"/>
</svg>