<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" width="256" height="256">
  <defs>
    <linearGradient id="gcdiscgrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(200,100,0,0.1);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgba(150,80,0,0.25);stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- GameCube disc overlay -->
  <circle cx="128" cy="128" r="120" fill="url(#gcdiscgrad)"/>
  <circle cx="128" cy="128" r="116" stroke="rgba(200,150,100,0.25)" stroke-width="2" fill="none"/>
  <!-- Center hole -->
  <circle cx="128" cy="128" r="32" fill="rgba(0,0,0,0.25)"/>
  <circle cx="128" cy="128" r="28" stroke="rgba(150,100,50,0.3)" stroke-width="1" fill="none"/>
  <!-- Glossy -->
  <ellipse cx="85" cy="85" rx="65" ry="55" fill="rgba(255,255,255,0.1)"/>
  <!-- GameCube rainbow spiral indicator -->
  <circle cx="128" cy="128" r="75" stroke="rgba(200,150,100,0.15)" stroke-width="2" fill="none"/>
</svg>