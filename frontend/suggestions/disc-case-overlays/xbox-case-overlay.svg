<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 196 288" role="img" aria-label="Xbox case overlay">
  <!-- Case border (dark green) -->
  <rect x="0.5" y="0.5" width="195" height="287" rx="2" fill="none" stroke="rgba(70,195,95,0.28)" stroke-width="1"/>
  <!-- Top header band (near-black green) -->
  <rect x="0" y="0" width="196" height="26" rx="2" fill="rgba(0,15,5,0.72)"/>
  <!-- Xbox logo indicator bar -->
  <rect x="60" y="8" width="76" height="11" rx="2" fill="rgba(75,200,100,0.26)"/>
  <!-- Subtle inner shadow -->
  <rect x="0" y="26" width="196" height="3" fill="rgba(0,0,0,0.22)"/>
  <!-- Bottom edge accent -->
  <rect x="0" y="277" width="196" height="11" rx="1" fill="rgba(0,15,5,0.42)"/>
</svg>
