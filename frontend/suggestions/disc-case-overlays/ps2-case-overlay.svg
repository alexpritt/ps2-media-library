<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" role="img" aria-label="PS2 case top banner overlay">
  <defs>
    <linearGradient id="ps2Bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#101842" stop-opacity="0.96"/>
      <stop offset="52%" stop-color="#1c2e7a" stop-opacity="0.93"/>
      <stop offset="100%" stop-color="#2845a5" stop-opacity="0.96"/>
    </linearGradient>
    <linearGradient id="ps2Glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.35)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="280" fill="url(#ps2Bar)"/>
  <rect x="0" y="0" width="1200" height="90" fill="url(#ps2Glow)"/>
  <rect x="0" y="274" width="1200" height="6" fill="rgba(0,0,0,0.28)"/>

  <text x="64" y="185" fill="#e8f0ff" font-size="128" font-family="Arial, Helvetica, sans-serif" font-weight="700" letter-spacing="7">PlayStation 2</text>
</svg>
