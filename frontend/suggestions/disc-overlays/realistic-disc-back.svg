<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="Reflective optical disc back">
  <defs>
    <radialGradient id="baseMetal" cx="36%" cy="28%" r="78%">
      <stop offset="0%" stop-color="#fdfefe"/>
      <stop offset="18%" stop-color="#e7ebf0"/>
      <stop offset="38%" stop-color="#cbd3dc"/>
      <stop offset="60%" stop-color="#99a4b1"/>
      <stop offset="82%" stop-color="#6b7481"/>
      <stop offset="100%" stop-color="#454d59"/>
    </radialGradient>

    <conicGradient id="rainbowSheen" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(120,180,255,0.00)"/>
      <stop offset="12%" stop-color="rgba(120,180,255,0.18)"/>
      <stop offset="24%" stop-color="rgba(170,130,255,0.20)"/>
      <stop offset="36%" stop-color="rgba(255,130,220,0.18)"/>
      <stop offset="48%" stop-color="rgba(255,170,120,0.16)"/>
      <stop offset="60%" stop-color="rgba(255,235,120,0.14)"/>
      <stop offset="72%" stop-color="rgba(150,255,170,0.15)"/>
      <stop offset="84%" stop-color="rgba(120,220,255,0.18)"/>
      <stop offset="100%" stop-color="rgba(120,180,255,0.00)"/>
    </conicGradient>

    <radialGradient id="darkVignette" cx="50%" cy="50%" r="62%">
      <stop offset="72%" stop-color="rgba(0,0,0,0.00)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.24)"/>
    </radialGradient>
  </defs>

  <!-- Metallic substrate -->
  <circle cx="512" cy="512" r="510" fill="url(#baseMetal)"/>

  <!-- Fine track rings to mimic optical grooves -->
  <g stroke="rgba(255,255,255,0.14)" fill="none">
    <circle cx="512" cy="512" r="462" stroke-width="1.2"/>
    <circle cx="512" cy="512" r="430" stroke-width="1.0"/>
    <circle cx="512" cy="512" r="398" stroke-width="1.0"/>
    <circle cx="512" cy="512" r="366" stroke-width="0.9"/>
    <circle cx="512" cy="512" r="334" stroke-width="0.9"/>
    <circle cx="512" cy="512" r="302" stroke-width="0.9"/>
    <circle cx="512" cy="512" r="270" stroke-width="0.8"/>
    <circle cx="512" cy="512" r="238" stroke-width="0.8"/>
    <circle cx="512" cy="512" r="206" stroke-width="0.8"/>
    <circle cx="512" cy="512" r="174" stroke-width="0.8"/>
    <circle cx="512" cy="512" r="142" stroke-width="0.8"/>
    <circle cx="512" cy="512" r="110" stroke-width="0.8"/>
  </g>

  <!-- Iridescent reflection -->
  <circle cx="512" cy="512" r="506" fill="url(#rainbowSheen)" opacity="0.62"/>

  <!-- Brighter highlight sweep -->
  <path d="M 116 402 A 420 420 0 0 1 512 86" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="42" stroke-linecap="round"/>
  <path d="M 642 118 A 390 390 0 0 1 908 502" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="26" stroke-linecap="round"/>

  <!-- Inner mirror ring -->
  <circle cx="512" cy="512" r="124" fill="none" stroke="rgba(245,250,255,0.44)" stroke-width="20"/>
  <circle cx="512" cy="512" r="96" fill="none" stroke="rgba(90,100,116,0.42)" stroke-width="12"/>

  <!-- Rim polish -->
  <circle cx="512" cy="512" r="506" fill="none" stroke="rgba(240,247,255,0.55)" stroke-width="3.5"/>
  <circle cx="512" cy="512" r="498" fill="none" stroke="rgba(80,86,98,0.42)" stroke-width="2"/>

  <!-- Subtle edge vignette for depth -->
  <circle cx="512" cy="512" r="510" fill="url(#darkVignette)"/>
</svg>
